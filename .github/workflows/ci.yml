name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  bucksaltbot-tests:
    name: bucksaltbot / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bucksaltbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bucksaltbot/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest -q tests

  bucksaltbot-node-check:
    name: bucksaltbot / npm install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bucksaltbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bucksaltbot/package-lock.json

      - name: Install Node dependencies
        run: npm ci

  unbuckbot-tests:
    name: unbuckbot / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unbuckbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: unbuckbot/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest -q tests
